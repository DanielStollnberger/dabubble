<section class="directs-section">
  <div (click)="toggleDirects()">
    <button matIconButton>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-icon>person</mat-icon>
    <span>Direct Messages</span>
  </div>
</section>
<section>
  @for (chat of chats$ | async; track chat.id) {
  @if (directsOpen) {
  <div class="directs" (click)="openChat(chat.id)">
    <img [src]="getOtherUser(chat)['avatar']">
    {{ getOtherUser(chat)?.name }}
  </div>
  }
  }
</section>
