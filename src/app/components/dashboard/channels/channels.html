<div class="channel-header">
  <div class="dropdown-channel-header" (click)="toggleChannels()">
    <button matIconButton>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-icon>bolt</mat-icon>
    <span>Channels</span>
  </div>
  <button matIconButton (click)="addChannel()">
    <mat-icon>add</mat-icon>
  </button>
</div>
<section>
  <div class="channels" (click)="openChat('dd')">
    <mat-icon>select_all</mat-icon>
    construction
  </div>
  <div class="channels" (click)="addChannel()">
    <mat-icon>add_circle</mat-icon>
    Add Channel
  </div>
</section>
