<div class="auth-container">

    <mat-card class="auth-card">
  
      <mat-card-header>
        <mat-card-title>Dabubble</mat-card-title>
        <mat-card-subtitle>Login to your account</mat-card-subtitle>
      </mat-card-header>
  
      <mat-card-content>
  
        <form class="auth-form">
  
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" placeholder="Enter your email">
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput type="password" placeholder="Enter your password">
          </mat-form-field>

          <button mat-flat-button [routerLink]="'/dashboard/WBHA1uDY1l9RqhlAWNC0'" color="primary" class="login-btn">
            Login
          </button>
  
        </form>
  
      </mat-card-content>
  
      <mat-card-actions>
        <button mat-button>Create Account</button>
      </mat-card-actions>
  
    </mat-card>
  
  </div>
