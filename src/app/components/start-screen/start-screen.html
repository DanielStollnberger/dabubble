<div class="auth-container">

    <mat-card class="auth-card">
  
      <mat-card-header>
        <mat-card-title>Dabubble</mat-card-title>
        <mat-card-subtitle>Login to your account</mat-card-subtitle>
      </mat-card-header>
  
      <mat-card-content>
  
        <form class="auth-form">

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput #email type="email" required>
          </mat-form-field>
        
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput #password type="password" required>
          </mat-form-field>
        
          <button type="button" mat-flat-button color="primary" class="login-btn" (click)="login(email.value, password.value)">
            Login
          </button>
        
        </form>
  
      </mat-card-content>
  
      <mat-card-actions>
        <button mat-button (click)="openSignup()">Quick Signup</button>
        <button mat-button (click)="loginAsGuest()">Guest Login</button>
      </mat-card-actions>
  
    </mat-card>
  
  </div>
